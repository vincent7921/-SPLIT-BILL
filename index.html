<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分帳系統</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #fffdf8;
      --surface2: #f0ebe0;
      --ink: #1a1714;
      --ink2: #6b6560;
      --accent: #c84b2f;
      --green: #2d6a4f;
      --red: #c84b2f;
      --border: #ddd8cc;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: 'DM Serif Display', serif;
      font-weight: 400;
    }

    /* Loading */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(245, 240, 232, 0.92);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      flex-direction: column;
      gap: 12px;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #overlay-msg {
      font-size: 14px;
      color: var(--ink2);
    }

    /* Modal */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 23, 20, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1500;
      padding: 16px;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 28px 24px;
      max-width: 420px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.18);
      border: 1px solid var(--border);
    }

    .modal h3 {
      font-size: 1.2rem;
      margin-bottom: 4px;
    }

    .modal-subtitle {
      font-size: 13px;
      color: var(--ink2);
      margin-bottom: 20px;
    }

    .accordion-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 8px;
      overflow: hidden;
    }

    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px;
      cursor: pointer;
      background: var(--surface);
      transition: background .15s;
      user-select: none;
    }

    .accordion-header:hover {
      background: var(--bg);
    }

    .accordion-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .accordion-icon {
      font-size: 16px;
    }

    .accordion-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--ink);
    }

    .accordion-arrow {
      font-size: 11px;
      color: var(--ink2);
      transition: transform .2s;
    }

    .accordion-arrow.open {
      transform: rotate(180deg);
    }

    .accordion-body {
      display: none;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
    }

    .accordion-body.open {
      display: block;
    }

    .acc-row {
      margin-bottom: 12px;
    }

    .acc-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--ink2);
      margin-bottom: 5px;
    }

    .acc-row input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .acc-row input:focus {
      border-color: var(--accent);
    }

    .modal-error {
      color: var(--red);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .btn-modal-cancel {
      flex: 1;
      background: var(--surface2);
      color: var(--ink2);
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-modal-cancel:hover {
      background: var(--border);
    }

    .modal-person-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .modal-person-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--surface);
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 14px;
    }

    .modal-person-item .p-name {
      flex: 1;
      font-weight: 500;
    }

    .btn-person-del {
      background: #fce8e4;
      color: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 3px 9px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-person-del:hover {
      background: #f8d0c8;
    }

    .modal-person-add-row {
      display: flex;
      gap: 8px;
    }

    .modal-person-add-row input {
      flex: 1;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .modal-person-add-row input:focus {
      border-color: var(--accent);
    }

    .btn-sm {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }

    .btn-sm:hover {
      background: #b03d24;
    }

    /* Setup */
    #setup-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .setup-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, .12);
      border: 1px solid var(--border);
    }

    @media(max-width:520px) {
      .setup-card {
        padding: 32px 20px;
      }
    }

    .setup-card h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .setup-subtitle {
      color: var(--ink2);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      font-family: inherit;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .person-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .person-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .person-row input {
      flex: 1;
    }

    .btn-icon {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      flex-shrink: 0;
    }

    .btn-remove {
      background: #fce8e4;
      color: var(--accent);
    }

    .btn-remove:hover {
      background: #f8d0c8;
    }

    .btn-add-person {
      background: none;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 10px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      color: var(--ink2);
      cursor: pointer;
      transition: all .2s;
    }

    .btn-add-person:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
      transition: background .2s;
    }

    .btn-primary:hover {
      background: #b03d24;
    }

    .btn-primary:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .setup-error {
      color: var(--red);
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }

    .setup-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--ink2);
      font-size: 13px;
    }

    .setup-divider::before,
    .setup-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--ink);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 28px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background .2s;
    }

    .btn-secondary:hover {
      background: var(--border);
    }

    /* Main */
    #main-screen {
      display: none;
    }

    .top-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 12px;
      flex-wrap: wrap;
    }

    .top-bar h2 {
      font-size: 1.3rem;
    }

    .top-bar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .group-name-badge {
      font-size: 12px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: .03em;
      white-space: nowrap;
    }

    .sync-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .sync-status.synced {
      background: #d8f3dc;
      color: var(--green);
    }

    .sync-status.saving {
      background: #fff3cd;
      color: #856404;
    }

    .sync-status.error {
      background: #fce8e4;
      color: var(--red);
    }

    .btn-topbar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--ink2);
      transition: background .15s;
      white-space: nowrap;
    }

    .btn-topbar:hover {
      background: var(--border);
      color: var(--ink);
    }

    #share-bar {
      display: none;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      flex-wrap: wrap;
    }

    #share-bar label {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink2);
      white-space: nowrap;
    }

    #share-url {
      flex: 1;
      min-width: 160px;
      padding: 7px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
    }

    #copy-btn {
      padding: 7px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s;
    }

    #copy-btn:hover {
      background: #b03d24;
    }

    .main-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      grid-template-columns: 390px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media(max-width:820px) {
      .main-content {
        grid-template-columns: 1fr;
      }
    }

    /* Collapsible Card */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
    }

    .card-header:hover {
      background: var(--surface2);
    }

    .card-header-left {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card-header h3 {
      font-size: 1.05rem;
    }

    .card-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-meta {
      font-size: 13px;
      color: var(--ink2);
    }

    .card-chevron {
      font-size: 11px;
      color: var(--ink2);
      transition: transform .2s;
    }

    .card-chevron.open {
      transform: rotate(180deg);
    }

    .card-body {
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    .card-body.collapsed {
      display: none;
    }

    .section-icon {
      font-size: 16px;
      margin-right: 6px;
    }

    /* Form */
    .form-row {
      margin-bottom: 16px;
    }

    .form-row-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--ink2);
      margin-bottom: 7px;
    }

    .form-row input[type=text],
    .form-row input[type=number],
    .form-row select,
    .currency-row input,
    .currency-row select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .form-row input:focus,
    .form-row select:focus,
    .currency-row input:focus,
    .currency-row select:focus {
      border-color: var(--accent);
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      min-height: 48px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      user-select: none;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--ink);
      transition: background .15s, border-color .15s, color .15s;
    }

    .chip.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .chip-link {
      font-size: 11px;
      color: var(--ink2);
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-family: inherit;
    }

    .chip-link:hover {
      color: var(--accent);
    }

    #custom-amounts {
      display: none;
      margin-top: 10px;
    }

    .custom-amount-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .custom-amount-row .name-tag {
      min-width: 52px;
      max-width: 70px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .custom-amount-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .custom-amount-row input:focus {
      border-color: var(--accent);
    }

    .unit-label {
      font-size: 12px;
      color: var(--ink2);
      flex-shrink: 0;
    }

    .custom-hint {
      font-size: 12px;
      color: var(--ink2);
      margin-top: 4px;
      min-height: 18px;
    }

    .custom-hint.ok {
      color: var(--green);
      font-weight: 600;
    }

    .custom-hint.bad {
      color: var(--red);
      font-weight: 600;
    }

    .error-msg {
      color: var(--red);
      font-size: 12px;
      margin-top: 6px;
      display: none;
    }

    .btn-submit {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 4px;
      transition: background .2s;
    }

    .btn-submit:hover {
      background: #b03d24;
    }

    .btn-submit:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    /* Currency row */
    .currency-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .currency-rate-note {
      font-size: 11px;
      color: var(--ink2);
      margin-top: 4px;
    }

    .currency-rate-note.loading {
      color: var(--accent);
    }

    /* Multi-payer */
    #multi-payer-section {
      display: none;
      margin-top: 6px;
    }

    .payer-amount-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .payer-amount-row .name-tag {
      min-width: 52px;
      max-width: 70px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .payer-amount-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      background: var(--bg);
      font-family: inherit;
      font-size: 14px;
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
    }

    .payer-amount-row input:focus {
      border-color: var(--accent);
    }

    .payer-hint {
      font-size: 12px;
      margin-top: 4px;
      min-height: 18px;
    }

    .payer-hint.ok {
      color: var(--green);
      font-weight: 600;
    }

    .payer-hint.bad {
      color: var(--red);
      font-weight: 600;
    }

    /* Right col */
    .right-col {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Expense list */
    .expense-item {
      border-bottom: 1px solid var(--border);
    }

    .expense-item:last-child {
      border-bottom: none;
    }

    .expense-summary {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background .15s;
    }

    .expense-summary:hover {
      background: var(--bg);
    }

    .expense-title {
      font-weight: 600;
      font-size: 14px;
    }

    .expense-meta {
      font-size: 12px;
      color: var(--ink2);
      margin-top: 2px;
    }

    .expense-right {
      text-align: right;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .expense-amount {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .expense-currency-tag {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 8px;
      background: #e8f4fd;
      color: #1a6fa8;
      font-weight: 600;
      white-space: nowrap;
    }

    .expand-icon {
      color: var(--ink2);
      font-size: 11px;
      transition: transform .2s;
    }

    .expand-icon.open {
      transform: rotate(180deg);
    }

    .expense-detail {
      padding: 0 20px 16px;
      display: none;
    }

    .expense-detail.open {
      display: block;
    }

    .split-row {
      display: flex;

    const hideErr = el => { el.style.display = 'none'; };
    const setSyncStatus = s => {
      const el = $('sync-status'), map = { synced: ['✓ 已同步', 'synced'], saving: ['↑ 儲存中', 'saving'], error: ['✕ 同步失敗', 'error'] };
      const [t, c] = map[s] || map.synced; el.textContent = t; el.className = 'sync-status ' + c;
    };
    const showOverlay = msg => { $('overlay-msg').textContent = msg || '載入中…'; $('loading-overlay').style.display = 'flex'; };
    const hideOverlay = () => { $('loading-overlay').style.display = 'none'; };
    const parseGroupId = raw => { raw = raw.trim(); try { const u = new URL(raw); return u.searchParams.get('g') || ''; } catch (e) { return raw; } };

    // ── Normalize expense: support old paidBy and new payers ──
    function getPayers(exp) {
      if (exp.payers && exp.payers.length) return exp.payers;
      return [{ personId: exp.paidBy, amount: exp.total }];
    }

    // ── Current TWD amount (works for both modes) ──
    function getTWD(exp) {
      return exp.total; // always stored as TWD
    }

    // ════════════════════════════════════════════════════════
    // CURRENCY / FX
    // ════════════════════════════════════════════════════════
    async function fetchRate(currency) {
      if (currency === 'TWD') return 1;
      const noteEl = $('rate-note');
      noteEl.className = 'currency-rate-note loading'; noteEl.textContent = '取得匯率中…';
      try {
        const res = await fetch(`https://open.er-api.com/v6/latest/${currency}`);
        const data = await res.json();
        const rate = data.rates && data.rates.TWD;
        if (!rate) throw new Error('無法取得匯率');
        noteEl.className = 'currency-rate-note';
        const dateStr = data.time_last_update_utc ? data.time_last_update_utc.substring(5, 16) : '';
        noteEl.textContent = `來源：Exchangerate-API · ${dateStr}`;
        return rate;
      } catch (e) {
        noteEl.className = 'currency-rate-note'; noteEl.style.color = 'var(--red)';
        noteEl.textContent = '匯率取得失敗，請手動輸入';
        return null;
      }
    }

    function onCurrencyChange() {
      const cur = $('exp-currency').value;
      const isTWD = cur === 'TWD';
      $('rate-row').style.display = isTWD ? 'none' : 'block';
      $('twd-row').style.display = isTWD ? 'none' : 'block';
      $('twd-direct-row').style.display = isTWD ? 'block' : 'none';

      // 即時更新畫面上所有單位的標籤
      document.querySelectorAll('#payer-inputs .unit-label').forEach(el => el.textContent = cur);
      document.querySelectorAll('#custom-inputs .unit-label').forEach(el => {
        if ($('split-method').value !== 'percent') el.textContent = cur;
      });

      if (!isTWD) {
        fetchRate(cur).then(rate => {
          if (rate) { $('exp-rate').value = fmtFx(rate); recalcTWD(); }
        });
      } else {
        recalcTWD();
      }
    }

    function recalcTWD() {
      const orig = parseFloat($('exp-original-amount').value) || 0;
      const rate = parseFloat($('exp-rate').value) || 0;
      const twd = Math.round(orig * rate * 100) / 100;
      $('exp-amount').value = twd || '';
      // Also update payer inputs if multi-payer
      if (isMultiPayer) updatePayerHint();
      if ($('split-method').value !== 'equal') rebuildCustomInputs();
    }

    function getCurrentTWDAmount() {
      const cur = $('exp-currency').value;
      if (cur === 'TWD') return parseFloat($('exp-amount-twd').value) || 0;
      return parseFloat($('exp-amount').value) || 0;
    }

    function getCurrentCurrency() {
      return $('exp-currency').value;
    }

    function getCurrentOriginalAmount() {
      const cur = getCurrentCurrency();
      if (cur === 'TWD') return parseFloat($('exp-amount-twd').value) || 0;
      return parseFloat($('exp-original-amount').value) || 0;
    }

    // ── Edit Logic ───────────────────────────────────────
    function startEdit(id) {
      const exp = expenses.find(e => e.id === id);
      if (!exp) return;
      editingExpenseId = id;

      // UI Updates
      $('form-title').textContent = '修改支出資料';
      $('submit-btn').textContent = '更新紀錄';
      $('cancel-edit-btn').style.display = 'block';
      $('card-add').scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Basic Info
      $('exp-title').value = exp.title;
      $('exp-currency').value = exp.currency || 'TWD';

      const isFX = exp.currency && exp.currency !== 'TWD';
      if (isFX) {
        $('exp-original-amount').value = exp.originalAmount || 0;
        $('exp-rate').value = exp.exchangeRate || 1;
        $('exp-amount').value = exp.total;
      } else {
        $('exp-amount-twd').value = exp.total;
      }
      onCurrencyChange(); // Refresh rows visibility

      // Payer Info
      const payers = getPayers(exp);
      if (payers.length > 1) {
        setMultiPayer(true);
        persons.forEach(p => {
          const pi = document.querySelector(`#payer-inputs input[data-pid="${p.id}"]`);
          const match = payers.find(x => x.personId === p.id);
          if (pi) pi.value = match ? match.amount : '';
        });
      } else {
        setMultiPayer(false);
        $('exp-payer').value = payers[0].personId;
      }
      updatePayerHint();

      // Split Info
      $('split-method').value = exp.splitMethod;
      const ids = (exp.splits || []).map(s => s.personId);
      document.querySelectorAll('#splitter-chips .chip').forEach(c => {
        c.classList.toggle('active', ids.includes(c.dataset.pid));
      });

      onSplitMethodChange(); // Show/hide custom box

      if (exp.splitMethod !== 'equal') {
        rebuildCustomInputs(); // This also triggers custom inputs creation
        exp.splits.forEach(s => {
          const ci = document.querySelector(`#custom-inputs input[data-pid="${s.personId}"]`);
          if (ci) {
            if (exp.splitMethod === 'percent') {
              ci.value = (s.amount / exp.total * 100).toFixed(1);
            } else {
              ci.value = s.amount;
            }
          }
        });
        updateCustomHint();
      }
    }

    function cancelEdit() {
      editingExpenseId = null;
      $('form-title').textContent = '新增支出';
      $('submit-btn').textContent = '記錄支出';
      $('cancel-edit-btn').style.display = 'none';

      $('exp-title').value = '';

      $('exp-amount').value = '';
      $('exp-amount-twd').value = '';
      $('exp-currency').value = 'TWD';

    async function autoJoinGroup(gid) {
      showOverlay('載入群組中…');

        const snap = await getDoc(doc(db, 'groups', gid));
        if (!snap.exists()) { hideOverlay(); alert('找不到此分帳群組'); return; }

      } catch (e) { hideOverlay(); alert('載入群組失敗：' + e.message); }

    async function startApp() {
      const groupName = $('group-name').value.trim();
      const inputs = document.querySelectorAll('#person-list .person-row input');
      const names = Array.from(inputs).map(i => i.value.trim()).filter(Boolean);
      const errEl = $('setup-error'); hideErr(errEl);

      if (names.length < 1) { showErr(errEl, '請至少新增一位成員'); return; }
      if (new Set(names).size !== names.length) { showErr(errEl, '成員名稱不可重複'); return; }
      const btn = $('start-btn'); btn.disabled = true; btn.textContent = '建立中…';
      try {
        persons = names.map((n, i) => ({ id: 'p' + (i + 1), name: n }));
        const ref = await addDoc(collection(db, 'groups'), { name: groupName, persons, createdAt: serverTimestamp() });
        groupId = ref.id; enterMainScreen(groupName);
      } catch (e) { showErr(errEl, 'Firebase 連線失敗：' + e.message); btn.disabled = false; btn.textContent = '建立新群組 →'; }

    $('btn-join-cancel').addEventListener('click', () => closeModal('modal-join'));
    $('btn-join-confirm').addEventListener('click', async () => {
      const raw = $('join-group-id').value.trim(); const errEl = $('join-error'); hideErr(errEl);
      if (!raw) { showErr(errEl, '請輸入群組 ID 或連結'); return; }
      const gid = parseGroupId(raw);
      if (!gid) { showErr(errEl, '無法解析群組 ID'); return; }
      const btn = $('btn-join-confirm'); btn.disabled = true; btn.textContent = '載入中…';
      try {
        const snap = await getDoc(doc(db, 'groups', gid));
        if (!snap.exists()) { showErr(errEl, '找不到此群組'); btn.disabled = false; btn.textContent = '加入'; return; }
        groupId = gid; persons = snap.data().persons || [];
        closeModal('modal-join'); enterMainScreen(snap.data().name);
        history.replaceState(null, '', '?g=' + gid);
      } catch (e) { showErr(errEl, '載入失敗：' + e.message); }
      finally { btn.disabled = false; btn.textContent = '加入'; }
    });

    // ENTER MAIN SCREEN

    function enterMainScreen(groupName) {
      $('setup-screen').style.display = 'none';
      $('main-screen').style.display = 'block';
      $('top-group-name').textContent = groupName;
      $('share-url').value = location.origin + location.pathname + '?g=' + groupId;

      initCardToggle('hdr-add', 'body-add', 'chv-add');

      initCardToggle('hdr-settle', 'body-settle', 'chv-settle');
      buildFormControls();
      subscribeExpenses();
      subscribeSettled();
      hideOverlay();

    function initCardToggle(hdrId, bodyId, chvId) {
      $(hdrId).addEventListener('click', () => {
        const body = $(bodyId), chv = $(chvId);
        const isOpen = !body.classList.contains('collapsed');
        body.classList.toggle('collapsed', isOpen);
        chv.classList.toggle('open', !isOpen);
      });
    }

    function subscribeExpenses() {
      if (unsubExpenses) unsubExpenses();
      const q = query(collection(db, 'groups', groupId, 'expenses'), orderBy('createdAt', 'asc'));
      unsubExpenses = onSnapshot(q, snap => {
        expenses = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderExpenseList(); renderLedger(); renderSettlement(); setSyncStatus('synced');
      }, err => { console.error(err); setSyncStatus('error'); });
    }

    function subscribeSettled() {
      if (unsubSettled) unsubSettled();
      unsubSettled = onSnapshot(collection(db, 'groups', groupId, 'settled'), snap => {
        settledIds = new Set(snap.docs.map(d => d.id));
        renderSettlement();
      });
    }

    $('copy-btn').addEventListener('click', () => {
      const inp = $('share-url'); inp.select(); inp.setSelectionRange(0, 9999);

    $('btn-open-manage').addEventListener('click', openManageModal);
    $('btn-manage-close').addEventListener('click', () => closeModal('modal-manage'));

    document.querySelectorAll('.accordion-header').forEach(header => {
      header.addEventListener('click', () => {
        const targetId = header.dataset.target, body = $(targetId);
        if (!body) return;
        const arrow = header.querySelector('.accordion-arrow'), isOpen = body.classList.contains('open');
        document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
        document.querySelectorAll('.accordion-arrow').forEach(a => a.classList.remove('open'));
        if (!isOpen) { body.classList.add('open'); arrow.classList.add('open'); }
      });
    });

    function openManageModal() {
      $('manage-current-group').textContent = '目前群組：' + $('top-group-name').textContent;

      document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('open'));
      document.querySelectorAll('.accordion-arrow').forEach(a => a.classList.remove('open'));

    function renderManagePersonList() {
      const list = $('manage-person-list'); list.innerHTML = '';
      if (!persons.length) { list.innerHTML = '<div style="color:var(--ink2);font-size:13px;">尚無成員</div>'; return; }
      persons.forEach(p => {
        const item = document.createElement('div'); item.className = 'modal-person-item';
        const ns = document.createElement('span'); ns.className = 'p-name'; ns.textContent = p.name;
        const db2 = document.createElement('button'); db2.className = 'btn-person-del'; db2.textContent = '刪除';

    async function deleteMember(pid, pname) {
      if (persons.length <= 1) { alert('至少需要保留一位成員'); return; }
      if (!confirm(`確定要刪除成員「${pname}」嗎？\n已記錄的支出不受影響。`)) return;
      const errEl = $('manage-member-error'); hideErr(errEl);
      try {
        const up = persons.filter(p => p.id !== pid);
        await updateDoc(doc(db, 'groups', groupId), { persons: up });
        persons = up; renderManagePersonList(); rebuildFormPersons();
      } catch (e) { showErr(errEl, '刪除失敗：' + e.message); }

    $('btn-add-member').addEventListener('click', async () => {
      const name = $('manage-new-person').value.trim(); const errEl = $('manage-member-error'); hideErr(errEl);
      if (!name) { showErr(errEl, '請輸入成員名稱'); return; }
      if (persons.some(p => p.name === name)) { showErr(errEl, '此成員名稱已存在'); return; }
      const nextNum = Math.max(0, ...persons.map(p => parseInt(p.id.replace('p', '')) || 0)) + 1;
      const np = { id: 'p' + nextNum, name };
      const btn = $('btn-add-member'); btn.disabled = true; btn.textContent = '新增中…';
      try {
        const up = [...persons, np];
        await updateDoc(doc(db, 'groups', groupId), { persons: up });
        persons = up; $('manage-new-person').value = '';
        renderManagePersonList(); rebuildFormPersons();
        btn.textContent = '✓ 已新增'; setTimeout(() => { btn.textContent = '新增'; btn.disabled = false; }, 1500);
      } catch (e) { showErr(errEl, '新增失敗：' + e.message); btn.disabled = false; btn.textContent = '新增'; }
    });

    $('btn-switch-group').addEventListener('click', async () => {
      const raw = $('manage-switch-id').value.trim(); const errEl = $('manage-switch-error'); hideErr(errEl);
      if (!raw) { showErr(errEl, '請輸入群組 ID 或連結'); return; }
      const gid = parseGroupId(raw);
      if (!gid) { showErr(errEl, '無法解析群組 ID'); return; }
      if (gid === groupId) { showErr(errEl, '已經在此群組中'); return; }
      const btn = $('btn-switch-group'); btn.disabled = true; btn.textContent = '切換中…';
      try {
        const snap = await getDoc(doc(db, 'groups', gid));
        if (!snap.exists()) { showErr(errEl, '找不到此群組'); return; }
        if (unsubExpenses) { unsubExpenses(); unsubExpenses = null; }
        if (unsubSettled) { unsubSettled(); unsubSettled = null; }
        groupId = gid; persons = snap.data().persons || []; expenses = []; settledIds = new Set();
        $('top-group-name').textContent = snap.data().name;
        $('share-url').value = location.origin + location.pathname + '?g=' + gid;
        history.replaceState(null, '', '?g=' + gid);
        closeModal('modal-manage'); buildFormControls(); subscribeExpenses(); subscribeSettled();
      } catch (e) { showErr(errEl, '切換失敗：' + e.message); }
      finally { btn.disabled = false; btn.textContent = '切換'; }
    });

    function addNewGroupPersonRow() {

      const row = document.createElement('div'); row.className = 'person-row';
      const inp = document.createElement('input'); inp.type = 'text'; inp.placeholder = '成員名稱'; inp.maxLength = 20;

      if (!newName) { showErr(errEl, '請輸入新群組名稱'); return; }
      if (!names.length) { showErr(errEl, '請至少新增一位成員'); return; }

      $('ledger-person').innerHTML = persons.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');

    // ════════════════════════════════════════════════════════
    // FORM CONTROLS
    // ════════════════════════════════════════════════════════
    function buildFormControls() {
      $('exp-payer').innerHTML = persons.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
      buildSplitterChips();
      buildPayerInputs();
      $('ledger-person').innerHTML = persons.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');

      // Currency
      $('exp-currency').addEventListener('change', onCurrencyChange);
      $('exp-original-amount').addEventListener('input', recalcTWD);
      $('exp-rate').addEventListener('input', recalcTWD);
      $('btn-refresh-rate').addEventListener('click', () => {

    // ── Multi-payer ───────────────────────────────────────
    function setMultiPayer(multi) {
      isMultiPayer = multi;
      $('single-payer-row').style.display = multi ? 'none' : 'block';
      $('multi-payer-section').style.display = multi ? 'block' : 'none';
      if (multi) updatePayerHint();
    }

    function buildPayerInputs() {
      const c = $('payer-inputs'); c.innerHTML = '';
      const cur = getCurrentCurrency();
      persons.forEach(p => {
        const row = document.createElement('div'); row.className = 'payer-amount-row';
        const ns = document.createElement('span'); ns.className = 'name-tag'; ns.textContent = p.name;
        const inp = document.createElement('input'); inp.type = 'number'; inp.dataset.pid = p.id;
        inp.min = '0'; inp.step = 'any'; inp.placeholder = '0';
        inp.addEventListener('input', updatePayerHint);
        const ul = document.createElement('span'); ul.className = 'unit-label'; ul.textContent = cur;
        row.appendChild(ns); row.appendChild(inp); row.appendChild(ul);
        c.appendChild(row);
      });
    }

    function updatePayerHint() {
      const total = getCurrentOriginalAmount();
      const cur = getCurrentCurrency();
      const sum = Array.from(document.querySelectorAll('#payer-inputs input[data-pid]'))
        .reduce((acc, i) => acc + (parseFloat(i.value) || 0), 0);
      const hint = $('payer-hint');
      if (!total && !sum) { hint.textContent = ''; hint.className = 'payer-hint'; return; }
      const diff = Math.round((total - sum) * 100) / 100;
      if (Math.abs(diff) < 0.01) { hint.textContent = `✓ 合計 ${fmt(sum)} ${cur}，與總額相符`; hint.className = 'payer-hint ok'; }
      else { hint.textContent = `付款合計 ${fmt(sum)} / 總額 ${fmt(total)} ${cur}，差額 ${fmt(diff)}`; hint.className = 'payer-hint bad'; }
    }

    // ── Splitter chips ────────────────────────────────────
    function buildSplitterChips() {
      const cg = $('splitter-chips'); cg.innerHTML = '';
      persons.forEach(p => {
        const chip = document.createElement('button');
        chip.type = 'button'; chip.className = 'chip active'; chip.textContent = p.name; chip.dataset.pid = p.id;
        chip.addEventListener('click', function () { this.classList.toggle('active'); refreshCustomInputs(); });
        cg.appendChild(chip);
      });
    }
    function getActiveIds() { return Array.from(document.querySelectorAll('#splitter-chips .chip.active')).map(c => c.dataset.pid); }
    function selectAllSplitters() { document.querySelectorAll('#splitter-chips .chip').forEach(c => c.classList.add('active')); refreshCustomInputs(); }
    function clearAllSplitters() { document.querySelectorAll('#splitter-chips .chip').forEach(c => c.classList.remove('active')); refreshCustomInputs(); }

    function onSplitMethodChange() {
      const method = $('split-method').value, box = $('custom-amounts');
      if (method === 'equal') { box.style.display = 'none'; } else { box.style.display = 'block'; rebuildCustomInputs(); }
    }
    function refreshCustomInputs() { if ($('split-method').value !== 'equal') rebuildCustomInputs(); }

    function rebuildCustomInputs() {
      const ids = getActiveIds(), method = $('split-method').value, amount = getCurrentOriginalAmount(), cur = getCurrentCurrency();
      const c = $('custom-inputs'); c.innerHTML = '';
      if (!ids.length) { updateCustomHint(); return; }
      ids.forEach(pid => {
        const person = persons.find(p => p.id === pid);
        const defVal = method === 'percent' ? (100 / ids.length).toFixed(1) : (amount > 0 ? (amount / ids.length).toFixed(2) : '');
        const row = document.createElement('div'); row.className = 'custom-amount-row';
        const ns = document.createElement('span'); ns.className = 'name-tag'; ns.textContent = person.name;
        const inp = document.createElement('input'); inp.type = 'number'; inp.dataset.pid = pid; inp.min = '0'; inp.step = 'any';
        inp.placeholder = method === 'percent' ? '%' : '金額'; inp.value = defVal;
        inp.addEventListener('input', updateCustomHint);
        const ul = document.createElement('span'); ul.className = 'unit-label'; ul.textContent = method === 'percent' ? '%' : cur;
        row.appendChild(ns); row.appendChild(inp); row.appendChild(ul); c.appendChild(row);
      });
      updateCustomHint();
    }

    function updateCustomHint() {
      const method = $('split-method').value; if (method === 'equal') return;
      const hint = $('custom-hint'), amount = getCurrentOriginalAmount(), cur = getCurrentCurrency();
      const sum = Array.from(document.querySelectorAll('#custom-inputs input[data-pid]')).reduce((acc, i) => acc + (parseFloat(i.value) || 0), 0);
      if (method === 'custom') {
        if (!sum && !amount) { hint.textContent = ''; hint.className = 'custom-hint'; return; }
        const diff = Math.round((amount - sum) * 100) / 100;
        if (Math.abs(diff) < 0.01) { hint.textContent = `✓ 合計 ${fmt(sum)} ${cur}`; hint.className = 'custom-hint ok'; }
        else { hint.textContent = `合計 ${fmt(sum)} / 總額 ${fmt(amount)} ${cur}，差 ${fmt(diff)}`; hint.className = 'custom-hint bad'; }
      } else {
        const diff = Math.round((100 - sum) * 10) / 10;
        if (Math.abs(diff) < 0.1) { hint.textContent = `✓ 合計 ${sum.toFixed(1)}%`; hint.className = 'custom-hint ok'; }
        else { hint.textContent = `合計 ${sum.toFixed(1)}%，需達 100%（差 ${diff.toFixed(1)}%）`; hint.className = 'custom-hint bad'; }
      }
    }

    // ════════════════════════════════════════════════════════
    // ADD EXPENSE
    // ════════════════════════════════════════════════════════
    async function addExpense() {
      const title = $('exp-title').value.trim();
      const currency = $('exp-currency').value;
      const originalAmount = currency === 'TWD' ? 0 : (parseFloat($('exp-original-amount').value) || 0);
      const rate = currency === 'TWD' ? 1 : (parseFloat($('exp-rate').value) || 0);
      const amount = getCurrentTWDAmount();
      const method = $('split-method').value, ids = getActiveIds();
      const errEl = $('form-error'); hideErr(errEl);

      if (!title) { showErr(errEl, '請輸入項目名稱'); return; }
      if (!amount || amount <= 0) { showErr(errEl, '金額必須大於 0'); return; }
      if (currency !== 'TWD' && (!originalAmount || originalAmount <= 0)) { showErr(errEl, '請輸入原始金額'); return; }
      if (currency !== 'TWD' && (!rate || rate <= 0)) { showErr(errEl, '請輸入匯率'); return; }
      if (!ids.length) { showErr(errEl, '請至少選擇一位分攤對象'); return; }

      // Payers
      let payers;
      const toTWD = (v) => Math.round(v * rate * 100) / 100;
      const origTotal = getCurrentOriginalAmount();

      if (isMultiPayer) {
        const payerInps = Array.from(document.querySelectorAll('#payer-inputs input[data-pid]'));
        const pUSDs = payerInps.map(i => ({ personId: i.dataset.pid, amount: parseFloat(i.value) || 0 })).filter(p => p.amount > 0);
        if (!pUSDs.length) { showErr(errEl, '請輸入至少一位付款人金額'); return; }
        const pSum = pUSDs.reduce((a, p) => a + p.amount, 0);
        if (Math.abs(pSum - origTotal) > 0.01) { showErr(errEl, `付款合計 ${fmt(pSum)} 與總額 ${fmt(origTotal)} ${currency} 不符`); return; }

        // Convert to TWD and handle remainder
        let assignedTWD = 0;
        payers = pUSDs.map((p, i) => {
          let t;
          if (i === pUSDs.length - 1) { t = Math.round((amount - assignedTWD) * 100) / 100; }
          else { t = toTWD(p.amount); assignedTWD += t; }
          return { personId: p.personId, amount: t };
        });
      } else {
        payers = [{ personId: $('exp-payer').value, amount }];
      }

      // Splits
      let splits = [];
      if (method === 'equal') {
        const each = Math.floor((amount / ids.length) * 100) / 100;
        const last = Math.round((amount - each * (ids.length - 1)) * 100) / 100;
        splits = ids.map((pid, i) => ({ personId: pid, amount: i === ids.length - 1 ? last : each }));
      } else if (method === 'custom') {
        const inps = Array.from(document.querySelectorAll('#custom-inputs input[data-pid]'));
        let sumUSD = 0;
        const sUSDs = [];
        for (const inp of inps) {
          const v = parseFloat(inp.value) || 0;
          if (v < 0) { showErr(errEl, '分攤金額不可為負數'); return; }
          sumUSD += v; sUSDs.push({ personId: inp.dataset.pid, usd: v });
        }
        if (Math.abs(sumUSD - origTotal) > 0.01) { showErr(errEl, `自訂金額合計 ${fmt(sumUSD)} 與總額 ${fmt(origTotal)} ${currency} 不符`); return; }

        let assignedTWD = 0;
        splits = sUSDs.map((s, i) => {
          let t;
          if (i === sUSDs.length - 1) { t = Math.round((amount - assignedTWD) * 100) / 100; }
          else { t = toTWD(s.usd); assignedTWD += t; }
          return { personId: s.personId, amount: t };
        });
      } else {
        const inps = Array.from(document.querySelectorAll('#custom-inputs input[data-pid]'));
        let pctSum = 0;
        const pcts = inps.map(inp => { const v = parseFloat(inp.value) || 0; pctSum += v; return { pid: inp.dataset.pid, pct: v }; });
        if (Math.abs(pctSum - 100) > 0.1) { showErr(errEl, `比例合計 ${pctSum.toFixed(1)}%，需等於 100%`); return; }
        let assignedSplitTWD = 0;
        splits = pcts.map((item, i) => {
          let amt = i === pcts.length - 1 ? Math.round((amount - assignedSplitTWD) * 100) / 100 : Math.round((amount * item.pct / 100) * 100) / 100;
          if (i < pcts.length - 1) assignedSplitTWD += amt;
          return { personId: item.pid, amount: amt };
        });
      }

      const btn = $('submit-btn'); btn.disabled = true; btn.textContent = '儲存中…'; setSyncStatus('saving');
      try {
        const expData = {
          title, total: amount, payers, splits,
          splitMethod: method, createdAt: serverTimestamp(),
          // FX fields
          currency,
          ...(currency !== 'TWD' ? { originalAmount, exchangeRate: rate } : {})
        };
        await addDoc(collection(db, 'groups', groupId, 'expenses'), expData);
        // Reset form
        $('exp-title').value = ''; $('exp-original-amount').value = ''; $('exp-amount').value = ''; $('exp-amount-twd').value = '';
        $('exp-currency').value = 'TWD'; onCurrencyChange();
        $('split-method').value = 'equal'; $('custom-amounts').style.display = 'none';
        $('custom-inputs').innerHTML = ''; $('custom-hint').textContent = '';
        if (isMultiPayer) { document.querySelectorAll('#payer-inputs input').forEach(i => i.value = ''); $('payer-hint').textContent = ''; }
        hideErr(errEl); selectAllSplitters();
      } catch (e) { showErr(errEl, '儲存失敗：' + e.message); setSyncStatus('error'); }
      finally { btn.disabled = false; btn.textContent = '記錄支出'; }
    }

    // ════════════════════════════════════════════════════════
    // RENDER EXPENSE LIST
    // ════════════════════════════════════════════════════════
    function renderExpenseList() {
      const container = $('expense-list'), countEl = $('expense-count');
      const activeCount = expenses.filter(e => !e.cleared).length;
      countEl.textContent = expenses.length ? `共 ${expenses.length} 筆，未結清 ${activeCount} 筆` : '';
      if (!expenses.length) { container.innerHTML = `<div class="empty-state"><div class="icon">🧾</div>尚無支出記錄</div>`; return; }
      container.innerHTML = '';

      expenses.slice().reverse().forEach(exp => {
        const payers = getPayers(exp);
        const mLabel = METHOD_LABELS[exp.splitMethod] || exp.splitMethod;
        const splits = exp.splits || [];
        const isCleared = !!exp.cleared;
        const isFX = exp.currency && exp.currency !== 'TWD';
        const sym = CURRENCY_SYMBOLS[exp.currency || 'TWD'] || '$';

        // Payer display string
        const payerNames = payers.map(p => {
          const person = persons.find(x => x.id === p.personId);
          return person ? person.name : '?';
        });
        const payerStr = payers.length === 1
          ? payerNames[0] + ' 付款'
          : payerNames.join('、') + ' 共同付款';

        const activeSplits = splits.filter(s => s.amount > 0);

        const item = document.createElement('div');
        item.className = 'expense-item' + (isCleared ? ' is-cleared' : '');

        const summary = document.createElement('div'); summary.className = 'expense-summary';

        const left = document.createElement('div'); left.style.minWidth = '0';
        const titleRow = document.createElement('div'); titleRow.className = 'expense-title'; titleRow.textContent = exp.title;
        const metaRow = document.createElement('div'); metaRow.className = 'expense-meta';
        metaRow.innerHTML = `${esc(payerStr)} · ${activeSplits.length} 人 <span class="method-badge">${mLabel}</span>`;
        left.appendChild(titleRow); left.appendChild(metaRow);

        const right = document.createElement('div'); right.className = 'expense-right';

        if (isFX) {
          const tag = document.createElement('span'); tag.className = 'expense-currency-tag';
          tag.textContent = exp.currency;
          right.appendChild(tag);
        }
        if (isCleared) {
          const badge = document.createElement('span'); badge.className = 'cleared-badge'; badge.textContent = '✓ 已結清';
          right.appendChild(badge);
        }
        const amtSpan = document.createElement('span'); amtSpan.className = 'expense-amount';
        amtSpan.textContent = `$${fmt(exp.total)} TWD`;
        right.appendChild(amtSpan);

        const clearBtn = document.createElement('button');
        clearBtn.className = 'btn-clear ' + (isCleared ? 'cleared' : 'uncleared');
        clearBtn.textContent = isCleared ? '取消結清' : '標記結清';
        clearBtn.addEventListener('click', async e => {
          e.stopPropagation(); setSyncStatus('saving');
          try { await updateDoc(doc(db, 'groups', groupId, 'expenses', exp.id), { cleared: !isCleared }); }
          catch (err) { alert('更新失敗：' + err.message); setSyncStatus('error'); }
        });
        right.appendChild(clearBtn);

        const delBtn = document.createElement('button'); delBtn.className = 'btn-delete'; delBtn.textContent = '刪除';
        delBtn.addEventListener('click', async e => {
          e.stopPropagation();
          if (!confirm('確定要刪除這筆支出嗎？')) return;
          setSyncStatus('saving');
          try { await deleteDoc(doc(db, 'groups', groupId, 'expenses', exp.id)); }
          catch (err) { alert('刪除失敗：' + err.message); setSyncStatus('error'); }
        });
        right.appendChild(delBtn);

        const expandIcon = document.createElement('span'); expandIcon.className = 'expand-icon'; expandIcon.textContent = '▼';
        right.appendChild(expandIcon);
        summary.appendChild(left); summary.appendChild(right);

        // Detail
        const detail = document.createElement('div'); detail.className = 'expense-detail';
        let detailHTML = '';
        // FX conversion note
        if (isFX) {
          detailHTML += `<div class="fx-note">💱 原始金額：${sym}${fmt(exp.originalAmount)} ${exp.currency} × ${fmtFx(exp.exchangeRate)} = $${fmt(exp.total)} TWD</div>`;
        }
        // Multi-payer breakdown
        if (payers.length > 1) {
          detailHTML += `<div style="font-size:12px;color:var(--ink2);margin-bottom:6px;">付款明細</div>`;
          payers.forEach(p => {
            const person = persons.find(x => x.id === p.personId);
            detailHTML += `<div class="split-row"><span>${esc(person ? person.name : '?')}</span><span><strong>$${fmt(p.amount)} TWD</strong></span></div>`;
          });
          detailHTML += `<div style="font-size:12px;color:var(--ink2);margin:8px 0 4px;">分攤明細（${mLabel}）${isCleared ? '<span style="color:var(--green);margin-left:6px;font-weight:600;">・已結清，不計入帳</span>' : ''}</div>`;
        } else {
          detailHTML += `<div style="font-size:12px;color:var(--ink2);margin-bottom:8px;">分攤明細（${mLabel}）${isCleared ? '<span style="color:var(--green);margin-left:6px;font-weight:600;">・已結清，不計入帳</span>' : ''}</div>`;
        }
        activeSplits.forEach(s => {
          const person = persons.find(p => p.id === s.personId);
          const extra = exp.splitMethod === 'percent' ? ` <span style="color:var(--ink2);font-size:11px;">(${(s.amount / exp.total * 100).toFixed(1)}%)</span>` : '';
          detailHTML += `<div class="split-row"><span>${esc(person ? person.name : '?')}</span><span><strong>$${fmt(s.amount)} TWD</strong>${extra}</span></div>`;
        });
        detail.innerHTML = detailHTML;

        summary.addEventListener('click', e => {
          if (e.target.classList.contains('btn-delete') || e.target.classList.contains('btn-clear')) return;
          detail.classList.toggle('open');
          expandIcon.classList.toggle('open', detail.classList.contains('open'));
        });

        item.appendChild(summary); item.appendChild(detail); container.appendChild(item);
      });
    }

    // ════════════════════════════════════════════════════════
    // RENDER LEDGER
    // ════════════════════════════════════════════════════════
    function renderLedger() {
      const pid = $('ledger-person').value, person = persons.find(p => p.id === pid);
      if (!person) return;
      let totalPaid = 0, totalSplit = 0;
      const activeRows = [], clearedRows = [];

      expenses.forEach(exp => {
        const payers = getPayers(exp);
        const myPay = payers.find(p => p.personId === pid);
        const myShare = (exp.splits || []).find(s => s.personId === pid);
        const paid = myPay ? myPay.amount : 0;
        const split = myShare ? myShare.amount : 0;
        if (paid <= 0 && split <= 0) return;
        const allPayerPersons = payers.map(p => { const x = persons.find(q => q.id === p.personId); return x ? x.name : '?'; });
        const isFX = exp.currency && exp.currency !== 'TWD';
        const row = {
          exp, paid, split, net: paid - split,
          payerStr: allPayerPersons.join('、'), isFX
        };
        if (exp.cleared) { clearedRows.push(row); }
        else { totalPaid += paid; totalSplit += split; activeRows.push(row); }
      });

      const balance = Math.round((totalPaid - totalSplit) * 100) / 100;
      const sc = balance > 0 ? 'positive' : balance < 0 ? 'negative' : 'zero';
      const label = balance > 0 ? '應收款' : balance < 0 ? '應付款' : '已平衡';
      const bc = balance > 0 ? 'badge-receive' : balance < 0 ? 'badge-pay' : 'badge-ok';

      const renderRow = (r, isCleared) => {
        const sign = r.net >= 0 ? '+' : '';
        const pctNote = (r.exp.splitMethod === 'percent' && r.split > 0) ? ` (${(r.split / r.exp.total * 100).toFixed(1)}%)` : '';
        const fxLine = r.isFX ? `<div class="ledger-fx-note">💱 ${CURRENCY_SYMBOLS[r.exp.currency] || ''}${fmt(r.exp.originalAmount)} ${r.exp.currency} × ${fmtFx(r.exp.exchangeRate)} = $${fmt(r.exp.total)} TWD</div>` : '';
        return `<div class="ledger-row${isCleared ? ' is-cleared' : ''}">
      <div class="ledger-row-left">
        <div class="ledger-row-title">${esc(r.exp.title)}</div>
        <div class="ledger-row-meta">付款：${esc(r.payerStr)} · ${METHOD_LABELS[r.exp.splitMethod] || ''}</div>
        ${fxLine}
        ${isCleared ? '<div class="ledger-cleared-note">✓ 已結清，不計入</div>' : ''}
      </div>
      <div class="ledger-row-right">
        ${r.paid > 0 ? `<div class="impact-paid">+$${fmt(r.paid)} TWD（已付）</div>` : ''}
        ${r.split > 0 ? `<div class="impact-split">−$${fmt(r.split)} TWD（分攤）${esc(pctNote)}</div>` : ''}
        <div class="impact-net">小計 ${sign}$${fmt(r.net)} TWD</div>
      </div>
    </div>`;
      };

      let html = `
    <div class="ledger-stats">
      <div class="stat-box"><div class="stat-label">已付總額</div><div class="stat-value">$${fmt(totalPaid)}</div></div>
      <div class="stat-box"><div class="stat-label">應分攤</div><div class="stat-value">$${fmt(totalSplit)}</div></div>
      <div class="stat-box"><div class="stat-label">差額 TWD</div><div class="stat-value ${sc}">${balance >= 0 ? '+' : ''}$${fmt(balance)}</div></div>
    </div>
    <span class="ledger-badge ${bc}">${label}：$${fmt(Math.abs(balance))} TWD</span>
    <div class="ledger-breakdown"><h4>未結清明細</h4>`;

      if (!activeRows.length) { html += `<div style="color:var(--ink2);font-size:13px;padding:8px 0;">此角色尚無未結清的支出紀錄</div>`; }
      else { activeRows.forEach(r => { html += renderRow(r, false); }); }
      if (clearedRows.length) { html += `<h4 style="margin-top:16px;">已結清（不計入）</h4>`; clearedRows.forEach(r => { html += renderRow(r, true); }); }
      html += `</div>`;
      $('ledger-content').innerHTML = html;
    }

    // ════════════════════════════════════════════════════════
    // SETTLEMENT
    // ════════════════════════════════════════════════════════
    function calcSettlement() {
      const activeExp = expenses.filter(e => !e.cleared);
      const balances = {};
      persons.forEach(p => balances[p.id] = 0);
      activeExp.forEach(exp => {
        getPayers(exp).forEach(p => { if (balances[p.personId] !== undefined) balances[p.personId] += p.amount; });
        (exp.splits || []).forEach(s => { if (balances[s.personId] !== undefined) balances[s.personId] -= s.amount; });
      });
      const creditors = [], debtors = [];
      persons.forEach(p => {
        const b = Math.round(balances[p.id] * 100) / 100;
        if (b > 0.01) creditors.push({ id: p.id, name: p.name, amount: b });
        if (b < -0.01) debtors.push({ id: p.id, name: p.name, amount: -b });
      });
      creditors.sort((a, b) => b.amount - a.amount);
      debtors.sort((a, b) => b.amount - a.amount);
      const txns = []; let ci = 0, di = 0;
      while (ci < creditors.length && di < debtors.length) {
        const c = creditors[ci], d = debtors[di];
        const amt = Math.round(Math.min(c.amount, d.amount) * 100) / 100;
        txns.push({ from: d.id, fromName: d.name, to: c.id, toName: c.name, amount: amt });
        c.amount = Math.round((c.amount - amt) * 100) / 100;
        d.amount = Math.round((d.amount - amt) * 100) / 100;
        if (c.amount < 0.01) ci++;
        if (d.amount < 0.01) di++;
      }
      return txns;
    }

    const settlementId = txn => `${txn.from}_${txn.to}_${Math.round(txn.amount * 100)}`;

    async function toggleSettled(sid, checked) {
      setSyncStatus('saving');
      try {
        if (checked) { await setDoc(doc(db, 'groups', groupId, 'settled', sid), { done: true, at: serverTimestamp() }); }
        else { await deleteDoc(doc(db, 'groups', groupId, 'settled', sid)); }
      } catch (e) { alert('儲存失敗：' + e.message); setSyncStatus('error'); }
    }

    function renderSettlement() {
      const container = $('settlement-content');
      if (!expenses.length) { container.innerHTML = '<div class="settlement-empty">尚無支出資料</div>'; return; }
      const txns = calcSettlement();
      if (!txns.length) { container.innerHTML = '<div class="settlement-empty">🎉 所有帳目已平衡！</div>'; return; }
      const doneCount = txns.filter(t => settledIds.has(settlementId(t))).length;
      let html = '';
      txns.forEach(txn => {
        const sid = settlementId(txn), done = settledIds.has(sid);
        html += `<div class="settlement-item">
      <input type="checkbox" class="settlement-checkbox" data-sid="${sid}" ${done ? 'checked' : ''}>
      <div class="settlement-text${done ? ' done' : ''}">
        <span class="settlement-from">${esc(txn.fromName)}</span>
        <span class="settlement-arrow">→</span>
        <span class="settlement-to">${esc(txn.toName)}</span>
      </div>
      <span class="settlement-amount${done ? ' done' : ''}">$${fmt(txn.amount)} TWD</span>
    </div>`;
      });
      html += `<div class="settlement-footer">共 ${txns.length} 筆轉帳，已完成 ${doneCount} 筆</div>`;
      container.innerHTML = html;
      container.querySelectorAll('.settlement-checkbox').forEach(cb => {
        cb.addEventListener('change', () => toggleSettled(cb.dataset.sid, cb.checked));
      });
    }
  </script>
